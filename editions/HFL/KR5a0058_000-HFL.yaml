body:
  text: 無上大乗要訣妙經宿四爾時大尊以龍漢之年於大福堂國化作自然七寳玄臺衆寳粧飾懸繒華蓋周覆一國於中平坐放大光明遍照十方无極世界一切朗然當是其時大聖衆神飛天神王丹靈真老太上三炁天君玉晨上皇諸真人左右二真无量大衆一時同㑹三界大魔王萬海中龍王十方仙人乗光來至奉獻珍寳價直无量百和之香不焚自薰天鈞妓樂同時俱作元始天王告太上大道君曰子積勲重大神智得道教化衆生開度一切三便巳逹萬聖之宗悉爲備矣然未得此无上大乗要訣究竟常住无量大法累劫積徳今果之矣因授以无上大乗要訣至法上无復色下无復淵究竟法身得不退轉位如我也并以三乗之法濟度衆生汝當勤行大慈之心令諸衆生得離煩惱超拔三界爲之橋梁於是太上道君避座稽首前受記旨而作此言今聞此法音心懷踊躍得未曽有所以者何我昔學道以來獨處山林或坐或行每作是念我亦同入法性云何天尊以小乗法而見濟度然是我咎非天尊也所以者何若我發心修行洞慧必以大乗而得度脫我等智淺聞有道法而便信受遂獲仙度支年而住不聞有此无極大乗之法今蒙告誨疑嫌泰然今日乃知是道真子從道中生從法化生於是道君不勝欣釋以偈頌曰我聞是法音得所未曽有心懷太歡喜疑網皆夷朽令不失大乗无滅壽長久能除衆生惱我聞諸漏愈情斷住小乘自責最上咎今獲无上記至極諸苦解同共一法中我昔未知此煩惱諸衆生孰能逹伏倚積徳行所招今蒙甘露灑金色三十二八十種妙體功徳甚深重魔王莫能訾於空法得證疑悔悉巳洗波巡並降伏今爲稽首禮道言我昔於无數劫所說无上道常教化汝等汝亦長夜隨我受學隨所應度引導汝等生道法中欲令汝志造我上道而汝彌委得小乗法而謂巳足我今爲汝說大乗經名无上靈寳教諸真法天尊曰汝積行厚重今得所願位登无上智慧具足臺闕七寳天華輝燁汝亦當以三乘法教化衆生於是衆聖共㑹諸天並集見道君獲无上果記心大歡喜踊躍无量各脫天衣及妙華香而以供養諸天妓樂百千萬種於虚空中一時俱作一切大衆皆發无上正真道意爾時道君得无上道記白天尊言昔隨教法能離衆中生老病死常住之法願爲四衆說其因縁令離疑悔无尊曰諸有智者以譬喻得解譬若文人其年衰邁財富无量其家廣大唯有一門百餘許人住止其中堂閻朽故歘然火起即大驚怖我雖得出而諸子等火宅嬉戲不知怖畏火來切巳不知爲患告諸子曰此爲火宅垂應燒死甚可怖畏我有下車中車大牛之車今在門外可以遊戲汝等出來隨所欲得隨意相給諸子歡喜競馳走出文人見子安穏得出於四座无復障閡其心泰然歡喜踊躍時諸子等各白父言先父所許玩好之具下車中車大牛之車願特賜與時丈人各賜諸子等一大車其車髙廣衆寳装鉸周匝欄楯四面懸鈴又於其上張設軒蓋亦以珍竒雜寳而嚴飾之寳繩交絡垂諸華瓔重敷綩綖安置丹枕駕以白牛膚色充梁形體姝好有大筋力行歩平正其疾如風又多㒒從而使侍衛文人言此諸㓜童皆是我子我既豐富寳車无數應當等心各各與之不宜差别所以者何我衆寳周給一國猶尚不匱何況諸子各乗大車甚爲歡喜非本所望道言而此文人濟我子命火宅之難兼又賜之七寳之車我行大慈亦復如此我爲一切世間之父於諸怖畏衰惱憂患无明闇蔽永盡无餘恒以善事度脫衆生三界煩惱皆是火宅而諸衆生生老病死憂悲苦惱愚癡闇蔽三毒之火教化令入无上至真之道見諸衆生爲生老病死憂悲苦惱之所焼煑亦以五欲財利故受種種苦惱又以貪著追求故現受衆苦後受地獄畜生餓鬼之苦若生天上及在人間貧窮困苦愛別離苦怨憎害苦如是等苦衆生沒在其中歡喜遊戲不覺不知不求解脫於此三界火宅東西馳走雖遭大苦不以爲患道見此厄便作此言我爲衆生之父應拔其苦與其无量智慧无極道場命其遊戲以自夷釋道言若以神力不說怖畏者衆生不能以是得度所以者何是諸衆生免生老病死憂悲苦惱而爲三界火宅所燒何由能解聖之智慧如彼長者雖復身手有力而不用之但以慇懃方便濟諸子等火宅之難後各與珍寳大車我亦復如此但以智慧方便於三界火宅拔濟衆生爲三乗地仙天仙无上道乗汝等莫得樂住三界火宅貪著麄弊聲色香味之類若貪著生愛則爲火所燒汝速出三界當得三乘下仙中仙上道之乗此言信矣終不虚也汝等明此三乘聖所稱讃唯愍衆生无所哀求靜定存思而自娛樂便得安穏无爲快樂若有衆生聞法信受勤修精進求一切智愍傷衆生度脫一切是名大乘求此乗者名爲无上至極之士如彼諸子爲求牛車出於火宅我欲令衆生免三界苦得不滅樂道說三乗引導衆生然後但以大乘而度脫之此法无窮但不能盡受以是因縁當知聖人隨宜說法於是道君既受記歡喜而說偈頌曰天尊說妙訣今聞昔未曽得道大智力壽命不可量一切皆歡喜聞經之道場勤修六度行執志當勇猛洞章布三界妙響流十方騰身大羅外翺遊无爲郷大慈愍衆生重告壽命長一切具善根除漏趣清涼若求一切慧行六大度行守戒常清淨堅志无上業施寳設供養盡心无恡惜持此一心福願求无上徳我得一切智悉諸神定力散香陳上願累功在萬億信受大乘法念道遣所著遨神升空洞萬願无堅塞自我成仙道无數劫巳經常演法教化一切諸衆生念入玄真迹神方過爾形鍊體久視法停神在上清我常住於此智慧力和平勤行升大羅遊樂造玉京衆仙爲知識神爽得夷榮哀哉諸衆生彌沒於苦惱故不爲現身令其思妙道因心有翹慕爲之敷靈寳躋神逹玉京宫殿甚珍好劫盡水火蕩其土隨運浩玉林耀華果法池可練澡无爲洞无爲不飡亦充飽自享无終壽畢契衞三寳念罪諸衆生惡業爲因縁萬劫更痛惱不聞靈寳篇賢者修功徳柔和質保堅求得道場處託孕入華蓮法音悟耳目群旅並諸天升仙壽无量仁者當歸賢久修業所得破魔拔穢塵壽命无數劫挺質求長生煩惱悉巳盡速成无上真天事曰是大乘經甚爲深奥淺識之人迷惑不解其餘下仙信道語故隨順此經非巳智慧忿憍慢怠者莫信此經凡夫淺識深著五欲聞不能解亦勿爲說設復有人不信是經聞有受持供養齎戒讀誦而毁謗之輕賤憎嫉而懷結恨是人之罪甚爲巨重命終之日墮地獄中經无數劫嬰大徒苦從地獄出還墮畜生之中受諸漏形疥癩萬毒惡瘡皆以身受雖云得生其苦頗重謗斯經故獲罪如是若此罪人後生人中諸根闇鈍偏曵攣癖盲聾背傴其有所言人不信受口氣常臭鬼魅所著貧窮下賤爲人所使多病消瘦又无衣服雖親附人人不在意若有所得尋復亡失或爲醫道順方治病更増他疾或復致死若自有病无人救療設服良藥而復増劇反逆劫盜重輙橫罹其殃如斯罪人永不得見衆聖神王說法妙經若有持戒清潔之人翹心信道希求大乗此諸人等乃可爲說靈寳妙經道君稽首請問天尊自此末世若有善男子善女人聞是靈寳經隨所願欲齎金寳信受及往觀聽得幾許福爾時元始天尊告道君曰當今末世若有清信道士及餘智者不問長幼忽聞是經若能受持飡味爲善者乃於功徳之處敷演此事其中聞者又發信心功徳甚大譬如一人家室富盛心發大願布施財寳以給衆乏又以道法教導衆生令得下仙飛騰五嶽其福多不道君稽首曰甚多天尊曰其人但施珍寳給與衆生其功无量況復教之神方令得升仙此功雖重故不如聞此靈寳經而爲歡喜其功甚大倍於施主非可筭計譬喻得知而此之人所爲不多乃獲此功況復齎受而爲供養者耶若復有人於講法處若復有人曽入齋戒乃語友人有此靈寳尊經言辭深妙共往聽受是人功徳轉身得於大乗之跡利根智慧百千萬世終不瘖瘂口氣不臭舌常先病口亦无病齒不垢黑不黄不踈亦不缺落唇不下垂亦不搴縮口不喎斜不厚不大亦不黧黑无諸可惡鼻不䐔䏲亦不曲戾面色不黑亦不屈曲无有一切不可喜相唇舌牙齒悉皆嚴好鼻隆髙直面貌圓滿眉髙而長額廣平直人相具足世世所生常與福㑹亦與經教相遇令人往聽功徳如此何況一心齋戒承受讀誦其福无量不可思議爾時天尊以偈頌曰若人於齋戒得聞是經音斯人功爲重獲福陪爲深如有大施主供給无量賔乃復爲演法令其入仙真暫生若水泡疾生厭離心得道位真人三明通六神不如一句經教化同法人此人福深厚功徳不可論得具足身栢峩峩上聖賔口氣无臭穢吐納出煙馨後生天人中宮殿翫竒珍勸人坐聽經真道常爲隣何況受持者其福不可陳設復有人以國城妻子无量珍寳之物而供養者是人所得功徳不如受持此靈寳真經其福最多譬如一切川流江河諸水之中海爲第一此經亦復如是於諸經中最爲其上又如衆星之中月爲第一此經亦復如是於千萬億諸經法中最爲照明又如白日耀光能除諸闇此經亦復如是能破一切不善之闇又如諸小王聖帝之王最爲第一此經亦復如是於衆經中最爲其尊又如大梵天王一切衆生之父此經亦復如是一切賢聖衆仙之父此經能救一切衆生離諸苦惱此經能大饒益一切衆生充滿其願如清涼池能濟一切諸渇之者如寒者得火如祼者得衣如子得母如渡得船如病得醫如闇得燈如貧得寳此大乗經亦復如是能令衆生等離一切苦生死之縳若人能齎金寳受持供養若復聞者其人功徳諸聖神王天帝之王莫能籌計天尊告道君曰衆生可愍嬰諸苦惱甚在可哀吾故慇懃重說是經汝勤廣開演濟度一切道君稽首伏受命㫖當是之時諸來㑹者感皆發自然正真道意四座神王作禮而退无上大乗要訣妙經
